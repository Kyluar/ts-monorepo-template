name: PR Commitlint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main, develop]

jobs:
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0

      - name: Lint PR title
        uses: dagger/dagger-for-github@496f1b3d8b0d823834c13e67cf8a8e08ca3b9602 # v8.4.0
        with:
          version: "latest"
          verb: call
          args: commitlint-message --message "${{ github.event.pull_request.title }}"

      - name: Lint commit range
        uses: dagger/dagger-for-github@496f1b3d8b0d823834c13e67cf8a8e08ca3b9602 # v8.4.0
        with:
          version: "latest"
          verb: call
          args: commitlint-range --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
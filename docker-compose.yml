services:
  web:
    container_name: web
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        - NODE_VERSION=${NODE_VERSION}
        - PNPM_VERSION=${PNPM_VERSION}
    image: web:latest
    restart: always
    ports:
      - 3000:3000
    networks:
      - app_network
networks:
  app_network:
    name: app_network